# @package harbor_trial_config
#
# Default Harbor Configuration for SkyRL training
#
# This config is passed directly to Harbor's TrialConfig. You can use any
# Harbor-supported options here. SkyRL only injects a few runtime values:
#   - task.path (from the prompt)
#   - agent.model_name (constructed from served_model_name)
#   - agent.kwargs.api_base (from SkyRL's HTTP endpoint)
#   - agent.kwargs.session_id (generated per-trial)
#
# See Harbor documentation for all available options:
# https://harborframework.com/docs
# And a full list of fields that TrialConfig supports:
# https://github.com/laude-institute/harbor/blob/5921cc40e8f6b5b0df0a3dc6354e0e679447eb54/src/harbor/models/trial/config.py

# Harbor TrialConfig fields below
# --------------------------------

# Where to store trial logging outputs
trials_dir: ~/trials

# Trial timeout multiplier (applied to default timeouts)
timeout_multiplier: 1.0

# Nemotron task.tomls set build_timeout_sec=600, tuned for prebuilt-image
# pulls. nitrobox builds locally; a cold per-skill base build (apt + pip)
# can exceed 600s. Cached rebuilds are seconds, so a generous cap is free.
environment_build_timeout_multiplier: 5.0

# Agent configuration
# See: harbor.models.trial.config.AgentConfig
agent:
  # Agent name. Options: terminus-2, terminus-1, terminus, oracle, claude-code,
  # aider, swe-agent, openhands, etc.
  name: terminus-2

  # The time given a single Trial to run. If fails, the Trial raises an AgentTimeoutError.
  override_timeout_sec: 1200

  # Agent-specific settings passed to the agent constructor
  kwargs:
    # Maximum number of agent episodes/iterations
    max_turns: 32

    # Suppress Harbor override warnings for max_turns
    suppress_max_turns_warning: true

    # Whether to enable context summarization when approaching token limits
    enable_summarize: false

    # Collect per-turn rollout details (required for step-wise training)
    collect_rollout_details: true

    # The only sampling param that directly gets passed to Terminus
    temperature: 1.0

    # Model info for token budgeting
    # NOTE: max_input_tokens should match generator.inference_engine.engine_init_kwargs.max_model_len
    # Raised to Qwen3.5-9B's native 262144 (256K) to avoid premature
    # ContextLengthExceededError during multi-turn agent runs. Pair with
    # max_model_len=262144 in run_harbor_gen.sh.
    model_info:
      max_input_tokens: 262144
      max_output_tokens: 16384
      # Set costs to 0 for local training
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

    # Extra kwargs forwarded into SkyRLNativeLLM (see
    # harbor_pgc/llms/skyrl_native_llm.py). Only the sampling params it
    # actually consumes get applied; HarborGenerator additionally injects
    # `proxy_url` and `tokenizer_path` here at runtime.
    llm_kwargs:
      # Per-request HTTP timeout to vllm-router.
      timeout: 900
      # Sampling params forwarded to vllm SamplingParams.
      top_p: 1.0
      top_k: -1
      min_p: 0.0

# Environment configuration
# nitrobox variant: local namespace sandboxes (rucnyz/harbor fork), drop-in
# Docker replacement — no cloud account/credit needed. The tasks' own
# environment/Dockerfile (with COPY files/) is built locally; buildkit layer
# caching shares the per-skill base layers across tasks.
# See: harbor.models.trial.config.EnvironmentConfig
environment:
  # Environment type. Options: nitrobox, docker, daytona, e2b, modal, runloop, gke
  type: nitrobox

  # Nemotron task.tomls carry docker_image pointing at E2B-era prebuilt skill
  # images that were built WITHOUT environment/files/ (E2B uploaded them via
  # SDK at runtime). nitrobox must instead build the task Dockerfile locally
  # so COPY files/ /app/ bakes the task inputs in — hence force_build.
  force_build: true

  # Resource overrides (optional)
  override_cpus: 1
  override_memory_mb: 1024
  override_storage_mb: 1024
  suppress_override_warnings: true

  # Environment-specific settings
  kwargs: {}


# Verifier configuration
# See: harbor.models.trial.config.VerifierConfig
verifier:
  # Set to true to skip verification (useful for debugging)
  disable: false

  # Override the verifier timeout (seconds)
  # override_timeout_sec: 300
